<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISM — Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d0f0d;
  --term: #111411;
  --green: #39ff6e;
  --green2: #1db84a;
  --green3: #0d5c26;
  --dim: #2a3d2a;
  --teal: #00e5c0;
  --coral: #ff6060;
  --amber: #f0c040;
  --blue: #60b8ff;
  --white: #d4e8d4;
  --gray: #4a5e4a;
  --mono: 'JetBrains Mono', monospace;
}

html, body {
  height: 100%;
  background: #000;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--green);
  overflow: hidden;
}

/* CRT phosphor flicker */
@keyframes flicker {
  0%,100% { opacity: 1; }
  92% { opacity: 1; }
  93% { opacity: 0.94; }
  94% { opacity: 1; }
  96% { opacity: 0.97; }
}

/* Cursor blink */
@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0; }
}

@keyframes scanline {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}

@keyframes typeIn {
  from { width: 0; }
  to { width: 100%; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Outer shell — macOS-style window */
.window {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  animation: flicker 8s infinite;
  position: relative;
  overflow: hidden;
}

/* Scanline sweep */
.window::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 3px;
  background: rgba(57,255,110,0.04);
  animation: scanline 6s linear infinite;
  pointer-events: none;
  z-index: 999;
}

/* Phosphor glow overlay */
.window::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 1px,
    rgba(0,0,0,0.18) 1px,
    rgba(0,0,0,0.18) 2px
  );
  pointer-events: none;
  z-index: 998;
}

/* Title bar */
.titlebar {
  height: 36px;
  background: #1a1f1a;
  border-bottom: 1px solid #1e2a1e;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.tb-btn {
  width: 12px; height: 12px;
  border-radius: 50%;
  cursor: pointer;
}
.tb-close  { background: #ff5f57; }
.tb-min    { background: #febc2e; }
.tb-max    { background: #28c840; }

.tb-title {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  font-size: 12px;
  color: var(--gray);
  letter-spacing: 0.04em;
}

.tb-right {
  margin-left: auto;
  font-size: 11px;
  color: var(--gray);
}

/* Tab bar */
.tabbar {
  background: #0f120f;
  border-bottom: 1px solid #1a241a;
  display: flex;
  align-items: flex-end;
  padding: 0 16px;
  gap: 0;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.tab {
  padding: 7px 20px 6px;
  font-size: 11px;
  color: var(--gray);
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: 4px 4px 0 0;
  cursor: pointer;
  transition: all 0.15s;
  margin-right: 2px;
}

.tab.active {
  background: var(--bg);
  color: var(--white);
  border-color: #1e2a1e;
  border-bottom-color: var(--bg);
}

/* Terminal body */
.terminal {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px 80px;
  position: relative;
  z-index: 10;
  scroll-behavior: smooth;
}

.terminal::-webkit-scrollbar { width: 6px; }
.terminal::-webkit-scrollbar-track { background: transparent; }
.terminal::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

/* Lines */
.line {
  display: flex;
  align-items: flex-start;
  line-height: 1.6;
  min-height: 20px;
  animation: fadeUp 0.15s ease both;
}

.line.gap { margin-top: 8px; }
.line.gap2 { margin-top: 16px; }

.prompt-sym {
  color: var(--green2);
  margin-right: 8px;
  flex-shrink: 0;
  user-select: none;
}

.cmd { color: var(--white); }
.cmd .c-bin  { color: var(--green); }
.cmd .c-flag { color: var(--teal); }
.cmd .c-arg  { color: var(--amber); }
.cmd .c-str  { color: var(--coral); }

.out       { color: var(--white); padding-left: 0; }
.out.dim   { color: var(--gray); }
.out.green { color: var(--green); }
.out.teal  { color: var(--teal); }
.out.coral { color: var(--coral); }
.out.amber { color: var(--amber); }
.out.blue  { color: var(--blue); }
.out.bold  { font-weight: 700; }

/* Progress bar */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-left: 0;
  line-height: 1.6;
  animation: fadeUp 0.15s ease both;
}

.progress-track {
  width: 200px;
  height: 8px;
  background: var(--dim);
  border-radius: 2px;
  overflow: hidden;
  flex-shrink: 0;
}

.progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* Table */
.tbl {
  padding-left: 0;
  width: 100%;
}

.tbl-row {
  display: flex;
  gap: 0;
  line-height: 1.8;
  animation: fadeUp 0.15s ease both;
}

.tbl-row.header { color: var(--gray); border-bottom: 1px solid var(--dim); margin-bottom: 2px; }

.col-1 { width: 220px; color: var(--teal); flex-shrink: 0; }
.col-2 { width: 140px; flex-shrink: 0; }
.col-3 { flex: 1; color: var(--gray); }
.tbl-row.header .col-1,
.tbl-row.header .col-2,
.tbl-row.header .col-3 { color: var(--gray); }

/* Badges inline */
.badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 2px;
  font-size: 11px;
  font-weight: 700;
}
.badge-ok     { background: rgba(57,255,110,0.15); color: var(--green); }
.badge-warn   { background: rgba(240,192,64,0.15); color: var(--amber); }
.badge-err    { background: rgba(255,96,96,0.15);  color: var(--coral); }
.badge-info   { background: rgba(96,184,255,0.15); color: var(--blue);  }
.badge-run    { background: rgba(0,229,192,0.12);  color: var(--teal);  }

/* ASCII box */
.ascii-box {
  border: 1px solid var(--green3);
  border-radius: 3px;
  padding: 12px 16px;
  margin: 4px 0;
  width: fit-content;
  max-width: 640px;
  animation: fadeUp 0.2s ease both;
}

/* Cursor */
.cursor {
  display: inline-block;
  width: 8px; height: 14px;
  background: var(--green);
  vertical-align: text-bottom;
  animation: blink 1.1s step-end infinite;
  margin-left: 2px;
}

/* Input row at bottom */
.input-row {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--term);
  border-top: 1px solid #1a241a;
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 20;
}

.input-prompt { color: var(--green2); flex-shrink: 0; }

.term-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--white);
  font-family: var(--mono);
  font-size: 13px;
  caret-color: var(--green);
}

.input-hint {
  font-size: 11px;
  color: var(--dim);
  flex-shrink: 0;
}
</style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="tb-btn tb-close"></div>
    <div class="tb-btn tb-min"></div>
    <div class="tb-btn tb-max"></div>
    <div class="tb-title">prism — bash — 140×48</div>
    <div class="tb-right" id="clock-tb"></div>
  </div>

  <div class="tabbar">
    <div class="tab active">prism@demo-node-01</div>
    <div class="tab">logs</div>
    <div class="tab">+</div>
  </div>

  <div class="terminal" id="terminal"></div>

  <div class="input-row">
    <span class="input-prompt">prism@demo-node-01 ~/prism $</span>
    <input class="term-input" id="term-input" type="text" autocomplete="off" spellcheck="false" placeholder="type a command or press enter to run…">
    <span class="input-hint">↑↓ history · tab complete</span>
  </div>
</div>

<script>
const term = document.getElementById('terminal');
const input = document.getElementById('term-input');
let lineIndex = 0;
let history = [];
let histIdx = -1;

function h(tag, cls, html) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (html !== undefined) el.innerHTML = html;
  el.style.animationDelay = (lineIndex * 18) + 'ms';
  lineIndex++;
  return el;
}

function line(promptSym, content, cls) {
  const div = h('div', 'line' + (cls ? ' ' + cls : ''));
  if (promptSym) {
    const sym = document.createElement('span');
    sym.className = 'prompt-sym';
    sym.textContent = promptSym;
    div.appendChild(sym);
  }
  const span = document.createElement('span');
  span.innerHTML = content;
  div.appendChild(span);
  term.appendChild(div);
  return div;
}

function out(content, cls) {
  const div = h('div', 'line');
  const span = document.createElement('span');
  span.className = 'out' + (cls ? ' ' + cls : '');
  span.innerHTML = content;
  div.appendChild(span);
  term.appendChild(div);
  return div;
}

function blank(size) {
  const div = document.createElement('div');
  div.className = 'line' + (size === 2 ? ' gap2' : ' gap');
  div.style.animationDelay = (lineIndex * 18) + 'ms';
  lineIndex++;
  term.appendChild(div);
}

function progress(label, pct, cls) {
  const wrap = h('div', 'progress-wrap');
  wrap.style.animationDelay = (lineIndex * 18) + 'ms';
  const lbl = document.createElement('span');
  lbl.className = 'out ' + (cls || '');
  lbl.style.minWidth = '280px';
  lbl.innerHTML = label;
  const track = document.createElement('div');
  track.className = 'progress-track';
  const fill = document.createElement('div');
  fill.className = 'progress-fill';
  fill.style.width = '0%';
  track.appendChild(fill);
  const pctSpan = document.createElement('span');
  pctSpan.className = 'out dim';
  pctSpan.textContent = pct + '%';
  wrap.appendChild(lbl);
  wrap.appendChild(track);
  wrap.appendChild(pctSpan);
  term.appendChild(wrap);
  setTimeout(() => { fill.style.width = pct + '%'; }, 100 + lineIndex * 18);
}

function tblHeader(cols) {
  const row = h('div', 'tbl-row header');
  cols.forEach((c, i) => {
    const cell = document.createElement('div');
    cell.className = ['col-1','col-2','col-3'][i];
    cell.textContent = c;
    row.appendChild(cell);
  });
  term.appendChild(row);
}

function tblRow(cols, c1cls, c2html) {
  const row = h('div', 'tbl-row');
  row.style.animationDelay = (lineIndex * 18) + 'ms';
  cols.forEach((c, i) => {
    const cell = document.createElement('div');
    cell.className = ['col-1','col-2','col-3'][i];
    if (i === 0 && c1cls) cell.className += ' ' + c1cls;
    cell.innerHTML = c;
    row.appendChild(cell);
  });
  term.appendChild(row);
}

function asciiBox(lines) {
  const box = h('div', 'ascii-box');
  lines.forEach(l => {
    const p = document.createElement('div');
    p.innerHTML = l;
    box.appendChild(p);
  });
  term.appendChild(box);
}

function badge(type, text) {
  return `<span class="badge badge-${type}">${text}</span>`;
}

function scrollBottom() {
  setTimeout(() => term.scrollTop = term.scrollHeight, 50);
}

// ── BOOT SEQUENCE ──
function boot() {
  lineIndex = 0;
  term.innerHTML = '';

  line('', `<span class="cmd"><span class="c-bin">prism</span> <span class="c-flag">--version</span></span>`, 'gap');
  out(`PRISM v0.1.0-prototype`, 'green bold');
  out(`Multi-agent CI/CD root cause analysis`, 'dim');
  out(`CI/CD Failure Analysis · github.com/your-org/prism`, 'dim');

  blank();
  line('', `<span class="cmd"><span class="c-bin">prism</span> <span class="c-flag">run</span> <span class="c-arg">--pipeline</span> <span class="c-str">silicon-validation</span> <span class="c-flag">--env</span> <span class="c-arg">ci</span></span>`, 'gap');
  blank();

  out(`Initializing PRISM pipeline…`, 'dim');
  out(`Loading config from <span style="color:var(--teal)">./config/pipeline.yaml</span>`, 'dim');
  out(`Connecting to ChromaDB at <span style="color:var(--teal)">localhost:8000</span>  ${badge('ok','CONNECTED')}`, '');
  out(`OpenAI endpoint health check  ${badge('ok','200 OK')}`, '');
  out(`K8s context: <span style="color:var(--amber)">demo-node-01</span>  HPA: <span style="color:var(--green)">active</span>  replicas: <span style="color:var(--white)">3/3</span>`, '');

  blank();
  out(`┌─ Failure type registration ───────────────────────┐`, 'dim');
  out(`│  <span style="color:var(--teal)">TIMING</span>      setup/hold violations         ${badge('run','ENABLED')}    │`, '');
  out(`│  <span style="color:var(--teal)">POWER</span>       rail/domain fault checks       ${badge('run','ENABLED')}    │`, '');
  out(`│  <span style="color:var(--teal)">FUNCTIONAL</span>  logic correctness failures     ${badge('run','ENABLED')}    │`, '');
  out(`│  <span style="color:var(--teal)">THERMAL</span>     junction temp constraint fails ${badge('run','ENABLED')}    │`, '');
  out(`└────────────────────────────────────────────────────┘`, 'dim');

  blank();
  out(`Spawning agents…`, 'dim');
  progress(`  <span style="color:var(--white)">FastAPI intake          </span>  starting`, 100, 'green');
  progress(`  <span style="color:var(--white)">CIDDQAAgent orchestrator</span>  loading langchain`, 100, 'green');
  progress(`  <span style="color:var(--white)">RCAAgent                </span>  loading chromadb index`, 100, 'green');
  progress(`  <span style="color:var(--white)">RemediationAgent        </span>  warming model`, 100, 'green');

  blank();
  out(`All agents ${badge('ok','READY')}  ·  pipeline ${badge('ok','RUNNING')}`, 'bold');

  blank(2);
  line('', `<span class="cmd"><span class="c-bin">prism</span> <span class="c-flag">status</span></span>`, 'gap');
  blank();

  tblHeader(['AGENT', 'STATUS', 'DETAILS']);
  tblRow(['FastAPI intake',           `${badge('run','RUNNING')}`, 'async queue · 3 workers · K8s HPA active']);
  tblRow(['CIDDQAAgent orchestrator', `${badge('run','RUNNING')}`, 'LangChain · correlating by build rev / failure type']);
  tblRow(['RCAAgent',                 `${badge('run','RUNNING')}`, 'GPT-4-Turbo · ChromaDB RAG · 312 corpus entries']);
  tblRow(['RemediationAgent',         `${badge('run','RUNNING')}`, 'GPT-4-Turbo · success probability scoring']);

  blank();
  out(`failures ingested   <span style="color:var(--green);font-weight:700">347</span>`, '');
  out(`RCAs generated      <span style="color:var(--green);font-weight:700">312</span>`, '');
  out(`avg triage time     <span style="color:var(--teal);font-weight:700">1.8s</span>`, '');
  out(`queue depth         <span style="color:var(--amber);font-weight:700">14</span>  (processing)`, '');

  blank(2);
  line('', `<span class="cmd"><span class="c-bin">prism</span> <span class="c-flag">tail</span> <span class="c-arg">--live</span> <span class="c-arg">--lines</span> <span class="c-str">10</span></span>`, 'gap');
  blank();
  out(`Streaming live failure feed  (Ctrl+C to stop)`, 'dim');
  blank();

  startLiveFeed();
  scrollBottom();
}

// ── LIVE FEED ──
const feedTypes = [
  { type: 'BITSTREAM', cls: 'coral', msgs: ['NAL header syntax violation at offset 0x3a2f', 'Invalid start code: expected 00 00 01', 'RBSP trailing bits missing in slice NAL'] },
  { type: 'METADATA',  cls: 'amber', msgs: ['ColorPrimaries=9 out of spec range', 'HDR10 MDCV MaxCLL exceeds level limit', 'SEI message payload size overflow'] },
  { type: 'FRAME',     cls: 'coral', msgs: ['CTU boundary misalignment at frame 482', 'Slice header parse failure: forbidden_zero_bit', 'Block size 64x64 violates profile constraint'] },
  { type: 'PROFILE',   cls: 'green', msgs: ['Level 5.1 Main tier: PASS', 'Profile High 4:2:2: conformant', 'Constraint flag validation: OK'] },
];

let feedInterval;
function startLiveFeed() {
  clearInterval(feedInterval);
  feedInterval = setInterval(() => {
    const t = feedTypes[Math.floor(Math.random() * feedTypes.length)];
    const msg = t.msgs[Math.floor(Math.random() * t.msgs.length)];
    const ts = new Date().toISOString().replace('T',' ').slice(0,19);
    const sev = t.cls === 'green' ? 'ok' : t.cls === 'amber' ? 'warn' : 'err';
    const div = document.createElement('div');
    div.className = 'line';
    div.innerHTML = `<span class="out dim">${ts}</span>&nbsp;&nbsp;<span class="out ${t.cls}" style="display:inline-block;min-width:88px">${t.type}</span>&nbsp;&nbsp;<span class="badge badge-${sev}" style="margin-right:8px">${sev.toUpperCase()}</span><span class="out dim">${msg}</span>`;
    term.appendChild(div);
    term.scrollTop = term.scrollHeight;
  }, 1800);
}

// ── COMMAND HANDLER ──
const commands = {
  help() {
    blank();
    out(`Available commands:`, 'dim');
    blank();
    out(`  <span style="color:var(--green)">prism run</span>      <span style="color:var(--amber)">--pipeline &lt;name&gt; [--env ci|dev]</span>    start the pipeline`, '');
    out(`  <span style="color:var(--green)">prism status</span>   show agent health &amp; stats`, '');
    out(`  <span style="color:var(--green)">prism tail</span>     <span style="color:var(--amber)">--live [--lines N]</span>                 stream failure feed`, '');
    out(`  <span style="color:var(--green)">prism rca</span>      <span style="color:var(--amber)">--id &lt;failure-id&gt;</span>                  fetch single RCA result`, '');
    out(`  <span style="color:var(--green)">prism agents</span>   list agent specs`, '');
    out(`  <span style="color:var(--green)">prism prompt</span>   print diagram prompt for Mermaid / AI tools`, '');
    out(`  <span style="color:var(--green)">prism stop</span>     stop all agents`, '');
    out(`  <span style="color:var(--green)">clear</span>          clear terminal`, '');
    blank();
  },

  status() {
    blank();
    tblHeader(['AGENT', 'STATUS', 'DETAILS']);
    tblRow(['FastAPI intake',           `${badge('run','RUNNING')}`, 'async queue · 3 workers · K8s HPA active']);
    tblRow(['CIDDQAAgent orchestrator', `${badge('run','RUNNING')}`, 'LangChain · correlating by build rev / failure type']);
    tblRow(['RCAAgent',                 `${badge('run','RUNNING')}`, 'GPT-4-Turbo · ChromaDB RAG · 312 corpus entries']);
    tblRow(['RemediationAgent',         `${badge('run','RUNNING')}`, 'GPT-4-Turbo · success probability scoring']);
    blank();
    out(`failures ingested   <span style="color:var(--green);font-weight:700">${347 + Math.floor(Math.random()*20)}</span>`, '');
    out(`RCAs generated      <span style="color:var(--green);font-weight:700">${312 + Math.floor(Math.random()*18)}</span>`, '');
    out(`avg triage time     <span style="color:var(--teal);font-weight:700">1.8s</span>`, '');
    out(`queue depth         <span style="color:var(--amber);font-weight:700">${Math.floor(Math.random()*30)}</span>`, '');
    blank();
  },

  agents() {
    blank();
    asciiBox([
      `<span style="color:var(--teal)">RCAAgent</span>`,
      `  model      GPT-4-Turbo`,
      `  retrieval  ChromaDB RAG`,
      `  corpus     historical CI/CD validation failures`,
      `  outputs    root_cause · severity · confidence_score`,
    ]);
    blank();
    asciiBox([
      `<span style="color:var(--coral)">RemediationAgent</span>`,
      `  model      GPT-4-Turbo`,
      `  inputs     RCAAgent findings`,
      `  outputs    ranked_fixes · success_probability`,
    ]);
    blank();
    asciiBox([
      `<span style="color:var(--blue)">CIDDQAAgent (orchestrator)</span>`,
      `  framework  LangChain`,
      `  correlates build rev · failure type · pipeline ID`,
      `  dispatches RCAAgent + RemediationAgent in parallel`,
      `  returns    structured JSON`,
    ]);
    blank();
  },

  rca() {
    const id = 'FAIL-' + Math.floor(Math.random()*9000+1000);
    blank();
    out(`Fetching RCA for failure <span style="color:var(--amber)">${id}</span>…`, 'dim');
    setTimeout(() => {
      blank();
      asciiBox([
        `<span style="color:var(--white);font-weight:700">RCA Result — ${id}</span>`,
        ``,
        `  failure_type     <span style="color:var(--teal)">BITSTREAM</span>`,
        `  root_cause       NAL unit syntax error: forbidden_zero_bit = 1`,
        `  severity         <span style="color:var(--coral)">HIGH</span>`,
        `  confidence       <span style="color:var(--green)">0.94</span>`,
        `  build_regression build v0.0.1 → v0.0.2  (driver: driver-xxx)`,
        ``,
        `  top_fix          Revert serializer patch (commit abc1234)`,
        `  success_prob     <span style="color:var(--green)">0.87</span>`,
        ``,
        `  similar_failures 12 in corpus  (last seen: 2024-09-14)`,
      ]);
      blank();
      term.scrollTop = term.scrollHeight;
    }, 600);
  },

  prompt() {
    blank();
    out(`Diagram prompt (Mermaid / AI tool input):`, 'dim');
    blank();
    const lines = [
      `Create a top-down flowchart for PRISM — Structure Validation Pipeline.`,
      ``,
      `NODES (top to bottom):`,
      `1. INGESTION HEADER [gray]`,
      `   "PRISM — CI/CD structure validation pipeline"`,
      `   Subtitle: "Structure validation · 100–500+ failures/day"`,
      ``,
      `2. FAILURE TYPE TAGS [gray pills]`,
      `   Bitstream/syntax · Metadata conformance`,
      `   Frame/block structure · Profile/level`,
      ``,
      `3. FASTAPI INTAKE [purple]`,
      `   "FastAPI intake" / "Async queue · Docker · K8s HPA"`,
      ``,
      `4. CIDDQAAGENT ORCHESTRATOR [purple]`,
      `   "CIDDQAAgent orchestrator"`,
      `   "LangChain · correlates by build rev / failure type"`,
      ``,
      `5a. RCAAGENT [teal, left branch]`,
      `    "RCAAgent" / "GPT-4-Turbo · ChromaDB RAG"`,
      `    Side annotation [dashed]: ChromaDB vector store`,
      ``,
      `5b. REMEDIATIONAGENT [coral, right branch]`,
      `    "RemediationAgent" / "GPT-4-Turbo · success prob"`,
      ``,
      `6. STRUCTURED JSON OUTPUT [teal]`,
      `   Root causes · severity · confidence scores`,
      ``,
      `7. OUTPUT CARDS [gray, row of 3]`,
      `   Root causes / per violation type`,
      `   Prioritized fixes / success probability`,
      `   Severity scores / cross-build correlation`,
      ``,
      `LEGEND: teal=analysis  coral=remediation`,
      `        purple=orchestration  gray=neutral`,
    ];
    lines.forEach(l => out(`  <span style="color:var(--dim)">│</span>  <span style="color:var(--white)">${l}</span>`, ''));
    blank();
  },

  stop() {
    clearInterval(feedInterval);
    blank();
    out(`Stopping agents…`, 'dim');
    out(`  RCAAgent          ${badge('warn','STOPPED')}`, '');
    out(`  RemediationAgent  ${badge('warn','STOPPED')}`, '');
    out(`  CIDDQAAgent       ${badge('warn','STOPPED')}`, '');
    out(`  FastAPI intake    ${badge('warn','STOPPED')}`, '');
    blank();
    out(`Pipeline stopped. Run <span style="color:var(--green)">prism run --pipeline structure-validation</span> to restart.`, 'dim');
    blank();
  },

  clear() {
    term.innerHTML = '';
    lineIndex = 0;
  },

  unknown(cmd) {
    blank();
    out(`prism: command not found: <span style="color:var(--coral)">${cmd}</span>`, '');
    out(`Try <span style="color:var(--green)">help</span> for available commands.`, 'dim');
    blank();
  }
};

// Command aliases
const aliases = {
  'prism run': () => boot(),
  'prism status': commands.status,
  'prism tail --live': () => { blank(); out(`Streaming live failure feed (already running)…`, 'dim'); blank(); startLiveFeed(); },
  'prism rca': commands.rca,
  'prism agents': commands.agents,
  'prism prompt': commands.prompt,
  'prism stop': commands.stop,
  'prism --version': () => { blank(); out(`PRISM v0.1.0-prototype`, 'green bold'); blank(); },
  'prism help': commands.help,
  'help': commands.help,
  'clear': commands.clear,
  'prism run --pipeline structure-validation': () => boot(),
};

input.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') {
    if (histIdx < history.length - 1) histIdx++;
    input.value = history[history.length - 1 - histIdx] || '';
    e.preventDefault();
  } else if (e.key === 'ArrowDown') {
    if (histIdx > 0) histIdx--;
    else { histIdx = -1; input.value = ''; }
    input.value = history[history.length - 1 - histIdx] || '';
    e.preventDefault();
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const val = input.value.trim();
    const match = Object.keys(aliases).find(k => k.startsWith(val) && k !== val);
    if (match) input.value = match;
  } else if (e.key === 'Enter') {
    const raw = input.value.trim();
    if (!raw) return;
    history.push(raw);
    histIdx = -1;

    lineIndex = 0;
    line('prism@demo-node-01 ~/prism $', `<span class="cmd">${raw}</span>`, 'gap');

    const handler = aliases[raw] || aliases[raw.split(' ').slice(0,2).join(' ')];
    if (handler) {
      handler();
    } else if (raw.startsWith('prism rca --id')) {
      commands.rca();
    } else {
      commands.unknown(raw);
    }

    input.value = '';
    scrollBottom();
  }
});

// Clock
setInterval(() => {
  document.getElementById('clock-tb').textContent =
    new Date().toISOString().replace('T',' ').slice(0,19) + ' UTC';
}, 1000);

// Boot on load
window.addEventListener('load', () => {
  setTimeout(boot, 300);
  input.focus();
});

document.querySelector('.window').addEventListener('click', () => input.focus());
</script>
